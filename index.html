<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kapital Manager · Snapshot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f1f5f9; padding: 20px; display: flex; justify-content: center; }
    #app { max-width: 1200px; width: 100%; background: #fff; border-radius: 28px; box-shadow: 0 16px 60px rgba(0,0,0,0.08); padding: 24px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .header h1 { font-size: 22px; font-weight: 700; color: #0b2b4a; letter-spacing: -0.3px; }
    .header .date { color: #5b6f82; font-size: 14px; background: #f0f4f9; padding: 4px 14px; border-radius: 40px; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
    .btn { background: #1a4b8c; border: none; color: white; font-weight: 600; padding: 10px 22px; border-radius: 40px; font-size: 14px; cursor: pointer; transition: 0.15s; }
    .btn:hover { background: #0d3a6d; }
    .btn-outline { background: transparent; border: 1.5px solid #d0dce8; color: #1e3a5f; }
    .btn-outline:hover { background: #eef4fa; }
    .grid-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 14px; margin-bottom: 28px; }
    .metric { background: #f8fafc; border-radius: 18px; padding: 16px 14px; border-left: 4px solid #1a4b8c; }
    .metric .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: #62748a; font-weight: 600; }
    .metric .value { font-size: 20px; font-weight: 700; color: #0b1f33; margin-top: 4px; }
    .section { margin-top: 28px; }
    .section-title { font-size: 16px; font-weight: 600; color: #1a3a5c; margin-bottom: 14px; border-bottom: 2px solid #e6edf4; padding-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f2f6fb; color: #1e3a5f; font-weight: 600; padding: 12px 10px; text-align: left; border-bottom: 2px solid #dce5ef; }
    td { padding: 10px 10px; border-bottom: 1px solid #ecf1f7; }
    tr:last-child td { border-bottom: none; }
    .badge { background: #e0e9f3; padding: 2px 12px; border-radius: 40px; font-size: 11px; font-weight: 600; color: #1a3a5c; }
    .donut-wrapper { display: flex; flex-wrap: wrap; gap: 30px; background: #fafcff; border-radius: 20px; padding: 20px; border: 1px solid #e6edf4; }
    .donut { flex: 0 0 180px; }
    .legend { flex: 1; min-width: 160px; display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .legend-color { width: 14px; height: 14px; border-radius: 6px; flex-shrink: 0; }
    .footer { margin-top: 30px; font-size: 12px; color: #8a9bae; text-align: center; border-top: 1px solid #e6edf4; padding-top: 18px; }
    @media (max-width: 600px) { 
      #app { padding: 14px; } 
      .metric .value { font-size: 17px; }
      .header h1 { font-size: 18px; }
      .btn { padding: 8px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div><h1>📊 Kapital Manager · Snapshot</h1></div>
    <div class="date" id="snapshot-date">Cargando...</div>
  </div>

  <div class="toolbar">
    <button class="btn" id="download-png-btn">⬇️ Descargar PNG</button>
    <button class="btn btn-outline" id="download-pdf-btn">📄 Descargar PDF</button>
    <button class="btn btn-outline" id="print-btn">🖨️ Imprimir / guardar como PDF</button>
  </div>

  <div id="snapshot-content">
    <!-- Las métricas se inyectarán aquí -->
    <div class="grid-metrics" id="metrics-grid"></div>

    <!-- Donut + top posiciones -->
    <div class="donut-wrapper" id="donut-wrapper">
      <div class="donut" id="donut-container">
        <svg viewBox="0 0 120 120" width="180" height="180" id="donut-svg">
          <!-- se genera con JS -->
        </svg>
      </div>
      <div class="legend" id="legend-list"></div>
    </div>

    <!-- Tabla de posiciones -->
    <div class="section">
      <div class="section-title">📋 Detalle de posiciones</div>
      <div style="overflow-x:auto;">
        <table id="positions-table">
          <thead>
            <tr>
              <th>Ticker</th><th>Empresa</th><th>Acc.</th><th>Precio (€)</th>
              <th>Invertido</th><th>Valor</th><th>P&L €</th><th>P&L %</th><th>Div. anual</th><th>Sector</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <div class="footer">Kapital Manager · Datos orientativos · No es recomendación de inversión</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  // ─── DATOS DE EJEMPLO (reemplázalos con tu lógica real) ───
  const state = {
    positions: [
      { ticker: "ACS.MC", name: "ACS", shares: 50, avg_cost: 22.69, currency: "EUR", sector: "Industria" },
      { ticker: "ACX.MC", name: "ACERINOX", shares: 197, avg_cost: 10.18, currency: "EUR", sector: "Materiales Básicos" },
      { ticker: "BEN", name: "Franklin Resources", shares: 31, avg_cost: 23.45, currency: "USD", sector: "Servicios Financieros" },
      { ticker: "BTI", name: "BRITISH AMERICAN TOBACCO", shares: 32, avg_cost: 25.85, currency: "USD", sector: "Consumo Defensivo" },
      { ticker: "CVS", name: "CVS Health Corp", shares: 36, avg_cost: 68.22, currency: "USD", sector: "Salud" },
      { ticker: "DGE.L", name: "Diageo", shares: 16, avg_cost: 28.50, currency: "GBP", sector: "Consumo Defensivo" },
      { ticker: "EBRO.MC", name: "EBRO FOODS", shares: 68, avg_cost: 16.98, currency: "EUR", sector: "Consumo Defensivo" },
      { ticker: "ENG.MC", name: "ENAGAS", shares: 58, avg_cost: 18.24, currency: "EUR", sector: "Utilities" },
      { ticker: "IBE.MC", name: "IBERDROLA", shares: 33, avg_cost: 9.26, currency: "EUR", sector: "Utilities" },
      { ticker: "KHC", name: "KRAFT HEINZ", shares: 122, avg_cost: 33.15, currency: "USD", sector: "Consumo Defensivo" },
      { ticker: "KO", name: "COCA COLA", shares: 12, avg_cost: 52.00, currency: "USD", sector: "Consumo Defensivo" },
      { ticker: "MMM", name: "3M", shares: 36, avg_cost: 107.75, currency: "USD", sector: "Industria" },
      { ticker: "MO", name: "ALTRIA", shares: 14, avg_cost: 40.20, currency: "USD", sector: "Consumo Defensivo" },
      { ticker: "NWN", name: "Northwest Natural", shares: 15, avg_cost: 34.43, currency: "USD", sector: "Utilities" },
      { ticker: "PFE", name: "PFIZER", shares: 40, avg_cost: 26.72, currency: "USD", sector: "Salud" },
      { ticker: "REP.MC", name: "REPSOL", shares: 95, avg_cost: 10.18, currency: "EUR", sector: "Energía" },
      { ticker: "TEF.MC", name: "TELEFONICA", shares: 295, avg_cost: 3.80, currency: "EUR", sector: "Comunicaciones" },
      { ticker: "TROW", name: "T. ROWE PRICE", shares: 14, avg_cost: 109.20, currency: "USD", sector: "Servicios Financieros" },
      { ticker: "UVV", name: "Universal Corporation", shares: 10, avg_cost: 49.75, currency: "USD", sector: "Consumo Defensivo" },
      { ticker: "VZ", name: "VERIZON", shares: 28, avg_cost: 39.21, currency: "USD", sector: "Comunicaciones" },
      { ticker: "WPC", name: "W.P. CAREY", shares: 26, avg_cost: 70.10, currency: "USD", sector: "Inmobiliario" },
      { ticker: "MAP.MC", name: "MAPFRE", shares: 534, avg_cost: 1.87, currency: "EUR", sector: "Servicios Financieros" },
      { ticker: "MCM.MC", name: "MIQUEL Y COSTAS", shares: 80, avg_cost: 12.38, currency: "EUR", sector: "Industria" },
      { ticker: "LOG.MC", name: "LOGISTA", shares: 57, avg_cost: 17.48, currency: "EUR", sector: "Industria" },
      { ticker: "KNOP", name: "KNOT Offshore Partners", shares: 102, avg_cost: 9.80, currency: "USD", sector: "Energía" },
      { ticker: "INTC", name: "INTEL CORPORATION", shares: 35, avg_cost: 25.39, currency: "USD", sector: "Tecnología" }
    ],
    priceCache: {
      "ACS.MC": 42.50, "ACX.MC": 11.38, "BEN": 28.12, "BTI": 32.59,
      "CVS": 54.20, "DGE.L": 30.80, "EBRO.MC": 21.06, "ENG.MC": 21.79,
      "IBE.MC": 14.30, "KHC": 32.88, "KO": 71.10, "MMM": 154.10,
      "MO": 52.12, "NWN": 43.20, "PFE": 28.72, "REP.MC": 16.38,
      "TEF.MC": 4.12, "TROW": 130.12, "UVV": 63.20, "VZ": 38.10,
      "WPC": 58.20, "MAP.MC": 2.18, "MCM.MC": 14.58, "LOG.MC": 21.48,
      "KNOP": 9.80, "INTC": 22.88
    },
    divInfo: [
      { ticker: "ACS.MC", annual_income: 1.20, div_yield: 0.028 },
      { ticker: "ACX.MC", annual_income: 0.45, div_yield: 0.039 },
      { ticker: "BEN", annual_income: 1.20, div_yield: 0.042 },
      { ticker: "BTI", annual_income: 2.45, div_yield: 0.075 },
      { ticker: "CVS", annual_income: 2.00, div_yield: 0.037 },
      { ticker: "DGE.L", annual_income: 0.80, div_yield: 0.026 },
      { ticker: "EBRO.MC", annual_income: 0.60, div_yield: 0.028 },
      { ticker: "ENG.MC", annual_income: 1.80, div_yield: 0.082 },
      { ticker: "IBE.MC", annual_income: 0.50, div_yield: 0.035 },
      { ticker: "KHC", annual_income: 1.60, div_yield: 0.048 },
      { ticker: "KO", annual_income: 1.76, div_yield: 0.025 },
      { ticker: "MMM", annual_income: 5.00, div_yield: 0.032 },
      { ticker: "MO", annual_income: 3.20, div_yield: 0.061 },
      { ticker: "NWN", annual_income: 1.90, div_yield: 0.044 },
      { ticker: "PFE", annual_income: 1.60, div_yield: 0.056 },
      { ticker: "REP.MC", annual_income: 0.45, div_yield: 0.027 },
      { ticker: "TEF.MC", annual_income: 0.15, div_yield: 0.036 },
      { ticker: "TROW", annual_income: 4.60, div_yield: 0.035 },
      { ticker: "UVV", annual_income: 3.20, div_yield: 0.051 },
      { ticker: "VZ", annual_income: 2.60, div_yield: 0.068 },
      { ticker: "WPC", annual_income: 4.90, div_yield: 0.084 },
      { ticker: "MAP.MC", annual_income: 0.12, div_yield: 0.055 },
      { ticker: "MCM.MC", annual_income: 0.35, div_yield: 0.024 },
      { ticker: "LOG.MC", annual_income: 0.60, div_yield: 0.028 },
      { ticker: "KNOP", annual_income: 0.50, div_yield: 0.050 },
      { ticker: "INTC", annual_income: 0.50, div_yield: 0.022 }
    ]
  };

  const FX = { EUR: 1, USD: 0.92, GBP: 1.17 };
  const toEUR = (v, cur) => v * (FX[cur] || 1);
  const fmtEUR = v => '€' + (v || 0).toFixed(2);
  const fmtPct = v => (v >= 0 ? '+' : '') + (v || 0).toFixed(1) + '%';
  const PIE = ['#2563eb','#16a34a','#f59e0b','#dc2626','#7c3aed','#0891b2','#be185d','#f97316','#84cc16','#64748b','#a78bfa','#fb923c','#14b8a6','#e879f9'];

  // ── Helper: precio de cierre simulado ──
  function getPrice(ticker) {
    return state.priceCache[ticker] || 0;
  }

  // ── Renderizar la snapshot ──
  function renderSnapshot() {
    const now = new Date();
    document.getElementById('snapshot-date').textContent = now.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });

    // ── Métricas ──
    let totalInv = 0, totalVal = 0;
    state.positions.forEach(p => {
      const inv = toEUR(p.shares * p.avg_cost, p.currency);
      const val = toEUR(p.shares * getPrice(p.ticker), p.currency);
      totalInv += inv;
      totalVal += val;
    });
    const pnl = totalVal - totalInv;
    const pnlPct = totalInv ? (pnl / totalInv * 100) : 0;
    const divAnual = state.divInfo.reduce((s, d) => s + toEUR(d.annual_income || 0, 'EUR'), 0);
    const yieldOnCost = totalInv ? (divAnual / totalInv * 100) : 0;

    document.getElementById('metrics-grid').innerHTML = `
      <div class="metric"><div class="label">Invertido</div><div class="value">${fmtEUR(totalInv)}</div></div>
      <div class="metric"><div class="label">Valor actual</div><div class="value">${fmtEUR(totalVal)}</div></div>
      <div class="metric" style="border-left-color:${pnl>=0?'#16a34a':'#dc2626'}"><div class="label">P&L</div><div class="value" style="color:${pnl>=0?'#16a34a':'#dc2626'}">${pnl>=0?'+':''}${fmtEUR(pnl)}</div></div>
      <div class="metric" style="border-left-color:${pnl>=0?'#16a34a':'#dc2626'}"><div class="label">Rentab.</div><div class="value" style="color:${pnl>=0?'#16a34a':'#dc2626'}">${fmtPct(pnlPct)}</div></div>
      <div class="metric" style="border-left-color:#b45309"><div class="label">Div. anual</div><div class="value" style="color:#b45309">${fmtEUR(divAnual)}</div></div>
      <div class="metric" style="border-left-color:#7c3aed"><div class="label">Yield / coste</div><div class="value" style="color:#7c3aed">${yieldOnCost.toFixed(2)}%</div></div>
    `;

    // ── Donut sectores ──
    const sectorMap = {};
    state.positions.forEach(p => {
      const val = toEUR(p.shares * getPrice(p.ticker), p.currency);
      const sec = p.sector || 'Otros';
      sectorMap[sec] = (sectorMap[sec] || 0) + val;
    });
    const entries = Object.entries(sectorMap).sort((a, b) => b[1] - a[1]);
    const totalSec = entries.reduce((s, e) => s + e[1], 0) || 1;

    // Donut SVG
    const svg = document.getElementById('donut-svg');
    const cx = 60, cy = 60, R = 48, r = 32;
    let angle = -Math.PI / 2;
    let paths = '';
    entries.forEach(([label, val], i) => {
      const pct = val / totalSec;
      const sweep = pct * 2 * Math.PI;
      const a1 = angle, a2 = angle + sweep;
      angle = a2;
      const x1 = cx + R * Math.cos(a1), y1 = cy + R * Math.sin(a1);
      const x2 = cx + R * Math.cos(a2), y2 = cy + R * Math.sin(a2);
      const xi1 = cx + r * Math.cos(a1), yi1 = cy + r * Math.sin(a1);
      const xi2 = cx + r * Math.cos(a2), yi2 = cy + r * Math.sin(a2);
      const large = sweep > Math.PI ? 1 : 0;
      const color = PIE[i % PIE.length];
      paths += `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${r},${r} 0 ${large},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z" fill="${color}" stroke="white" stroke-width="1.5"/>`;
    });
    svg.innerHTML = paths + `<text x="60" y="56" text-anchor="middle" font-size="12" font-weight="700" fill="#1a3a5c">${state.positions.length}</text><text x="60" y="72" text-anchor="middle" font-size="8" fill="#6b7f93">pos.</text>`;

    // Leyenda
    const legend = document.getElementById('legend-list');
    legend.innerHTML = entries.map(([label, val], i) => `
      <div class="legend-item">
        <span class="legend-color" style="background:${PIE[i % PIE.length]}"></span>
        <span style="flex:1">${label}</span>
        <span style="font-weight:600;color:#1a3a5c">${(val/totalSec*100).toFixed(1)}%</span>
        <span style="color:#62748a;font-size:12px;">${fmtEUR(val)}</span>
      </div>
    `).join('');

    // ── Tabla de posiciones ──
    const sorted = [...state.positions].sort((a,b) => {
      const va = toEUR(a.shares * getPrice(a.ticker), a.currency);
      const vb = toEUR(b.shares * getPrice(b.ticker), b.currency);
      return vb - va;
    });
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = sorted.map(p => {
      const inv = toEUR(p.shares * p.avg_cost, p.currency);
      const val = toEUR(p.shares * getPrice(p.ticker), p.currency);
      const pnl = val - inv;
      const pct = inv ? (pnl / inv * 100) : 0;
      const div = state.divInfo.find(d => d.ticker === p.ticker);
      const divAnn = div ? toEUR(div.annual_income || 0, 'EUR') : 0;
      return `<tr>
        <td><strong>${p.ticker}</strong></td>
        <td>${p.name || p.ticker}</td>
        <td>${p.shares}</td>
        <td>${fmtEUR(toEUR(getPrice(p.ticker), p.currency))}</td>
        <td>${fmtEUR(inv)}</td>
        <td>${fmtEUR(val)}</td>
        <td style="color:${pnl>=0?'#16a34a':'#dc2626'}">${pnl>=0?'+':''}${fmtEUR(pnl)}</td>
        <td style="color:${pnl>=0?'#16a34a':'#dc2626'}">${fmtPct(pct)}</td>
        <td>${divAnn>0 ? fmtEUR(divAnn) : '—'}</td>
        <td>${p.sector || '—'}</td>
      </tr>`;
    }).join('');
  }

  // ── Captura PNG con html2canvas ──
  async function captureSnapshot() {
    const el = document.getElementById('snapshot-content');
    const canvas = await html2canvas(el, {
      scale: 2,
      backgroundColor: '#ffffff',
      allowTaint: false,
      useCORS: true,
      logging: false
    });
    return canvas;
  }

  // ── Descargar PNG ──
  document.getElementById('download-png-btn').addEventListener('click', async () => {
    const canvas = await captureSnapshot();
    const link = document.createElement('a');
    link.download = `KapitalManager_Snapshot_${new Date().toISOString().slice(0,10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  // ── Descargar PDF (jspdf + html2canvas) ──
  document.getElementById('download-pdf-btn').addEventListener('click', async () => {
    const canvas = await captureSnapshot();
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('l', 'mm', 'a4');
    const pdfWidth = 280;
    const pdfHeight = (canvas.height / canvas.width) * pdfWidth;
    pdf.addImage(imgData, 'PNG', 10, 10, pdfWidth-20, pdfHeight-20);
    pdf.save(`KapitalManager_Snapshot_${new Date().toISOString().slice(0,10)}.pdf`);
  });

  // ── Imprimir / guardar como PDF (print) ──
  document.getElementById('print-btn').addEventListener('click', () => {
    window.print();
  });

  // ── Inicializar ──
  renderSnapshot();
</script>
</body>
</html>
