<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kapital Manager</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --purple: #7c3aed;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    button, select, input { font: inherit; }
    .app-shell { padding: 14px; }
    .topbar, .tabs, .card, .chart-card, .table-card, .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .topbar { padding: 12px 14px; margin-bottom: 10px; }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }
    .metric-card {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }
    .metric-label { font-size: 12px; color: var(--muted); font-weight: 700; }
    .metric-value { font-size: 18px; font-weight: 800; margin-top: 4px; }
    .tabs { display: flex; gap: 8px; padding: 10px 12px; margin-bottom: 12px; overflow-x: auto; }
    .tab-btn {
      border: 0;
      background: transparent;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }
    .tab-btn.active { background: #eff6ff; color: var(--blue); }
    .charts-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      background: #f8fafc;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .field-inline {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .field-inline span {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
    }
    .field-inline select {
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      background: #fff;
      min-width: 140px;
    }
    .btn {
      background: var(--blue);
      color: #fff;
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .charts-grid { display: grid; gap: 16px; }
    .charts-grid-main { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .charts-grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-top: 14px; }
    .chart-card {
      padding: 16px;
      min-height: 320px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }
    .chart-card h4 { margin: 0 0 10px 0; font-size: 14px; color: #1e293b; }
    .chart-wide svg { width: 100%; height: auto; display: block; max-height: 330px; }
    .muted { color: var(--muted); }
    @media (max-width: 1100px) {
      .cards-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .charts-grid-main, .charts-grid-3 { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .cards-grid { grid-template-columns: 1fr; }
      .field-inline select { min-width: 120px; }
      .chart-card { min-height: 280px; padding: 14px; }
      .chart-wide svg { max-height: 280px; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const state = window.state || (window.state = {});
state.activeTab = state.activeTab ?? 0;
state.portfolioCharts = state.portfolioCharts || {
  selectedTicker: 'Todas',
  period: '5A',
  divPeriod: 'Anual',
  index: 'SP500',
  chartData: {},
  indexData: {},
  loading: false
};

function fmtEUR(v) {
  return new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 2 }).format(Number(v || 0));
}
function fmtNum(v) {
  return new Intl.NumberFormat('es-ES', { maximumFractionDigits: 2 }).format(Number(v || 0));
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function safeGetValues(data, key, fallback = []) {
  if (!data || typeof data !== 'object') return fallback;
  const val = data[key];
  return Array.isArray(val) && val.length ? val : fallback;
}
function renderDonutChart(items, opts = {}) {
  const width = opts.width || 360;
  const height = opts.height || 260;
  const cx = width / 2;
  const cy = height / 2 - 8;
  const r = opts.r || 74;
  const stroke = opts.stroke || 18;
  const total = items.reduce((s, i) => s + (Number(i.value) || 0), 0);
  const colors = opts.colors || ['#3b82f6', '#22c55e', '#f59e0b', '#a855f7', '#ef4444', '#06b6d4', '#84cc16', '#f97316', '#14b8a6', '#8b5cf6'];

  if (!total) {
    return `
      <svg viewBox="0 0 ${width} ${height}" style="width:100%;height:auto;display:block;max-height:${opts.maxHeight || 280}px">
        <text x="${cx}" y="${cy}" text-anchor="middle" fill="#94a3b8" font-size="13">Sin datos</text>
      </svg>
    `;
  }

  let acc = 0;
  const circumference = 2 * Math.PI * r;

  const circles = items.map((it, idx) => {
    const value = Number(it.value) || 0;
    const dash = circumference * (value / total);
    const gap = circumference - dash;
    const offset = circumference * (1 - acc / total);
    acc += value;
    const color = it.color || colors[idx % colors.length];
    return `
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${offset}" transform="rotate(-90 ${cx} ${cy})">
        <title>${it.label}: ${it.valueText || value}</title>
      </circle>
    `;
  }).join('');

  return `
    <svg viewBox="0 0 ${width} ${height}" style="width:100%;height:auto;display:block;max-height:${opts.maxHeight || 280}px">
      ${circles}
      <circle cx="${cx}" cy="${cy}" r="${r - stroke / 2 - 1}" fill="#fff"></circle>
      <text x="${cx}" y="${cy - 2}" text-anchor="middle" fill="#334155" font-size="18" font-weight="700">${opts.centerTop || ''}</text>
      <text x="${cx}" y="${cy + 18}" text-anchor="middle" fill="#94a3b8" font-size="11">${opts.centerBottom || ''}</text>
    </svg>
  `;
}

function buildPortfolioChartSVG(tickers, period) {
  const w = 760, h = 320, m = 36;
  return `<svg viewBox="0 0 ${w} ${h}" class="chart-svg"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#94a3b8">Gráfico de cartera (${tickers.length} empresas)</text></svg>`;
}

function buildDividendChartSVG(tickers, divPeriod) {
  const w = 760, h = 320;
  return `<svg viewBox="0 0 ${w} ${h}" class="chart-svg"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#94a3b8">Dividendos históricos</text></svg>`;
}
function onChartsSelectorChange(field, value) {
  state.portfolioCharts[field] = value;
  loadPortfolioChartData();
}

function renderChartsSelector(tickers) {
  const selected = state.portfolioCharts.selectedTicker;
  const period = state.portfolioCharts.period;
  const divPeriod = state.portfolioCharts.divPeriod;
  const index = state.portfolioCharts.index;

  const tickerOptions = [
    `<option value="Todas" ${selected === 'Todas' ? 'selected' : ''}>Todas las empresas</option>`,
    ...tickers.map(t => `<option value="${t}" ${selected === t ? 'selected' : ''}>${t}</option>`)
  ].join('');

  const periodOptions = ['1A', '3A', '5A', '10A', 'MAX']
    .map(p => `<option value="${p}" ${period === p ? 'selected' : ''}>${p}</option>`)
    .join('');

  const divPeriodOptions = ['Mensual', 'Trimestral', 'Anual']
    .map(p => `<option value="${p}" ${divPeriod === p ? 'selected' : ''}>${p}</option>`)
    .join('');

  const indexOptions = ['SP500', 'Nasdaq', 'IBEX35']
    .map(i => `<option value="${i}" ${index === i ? 'selected' : ''}>${i}</option>`)
    .join('');

  return `
    <div class="charts-selector">
      <div class="field-inline">
        <span>Empresa</span>
        <select onchange="onChartsSelectorChange('selectedTicker', this.value)">${tickerOptions}</select>
      </div>
      <div class="field-inline">
        <span>Período</span>
        <select onchange="onChartsSelectorChange('period', this.value)">${periodOptions}</select>
      </div>
      <div class="field-inline">
        <span>Divid.</span>
        <select onchange="onChartsSelectorChange('divPeriod', this.value)">${divPeriodOptions}</select>
      </div>
      <div class="field-inline">
        <span>Índice</span>
        <select onchange="onChartsSelectorChange('index', this.value)">${indexOptions}</select>
      </div>
      <button class="btn" onclick="loadPortfolioChartData()" style="margin-left:auto">Actualizar</button>
    </div>
  `;
}

async function loadPortfolioChartData() {
  if (state.portfolioCharts.loading) return;
  state.portfolioCharts.loading = true;
  renderActiveTab();

  try {
    const selected = state.portfolioCharts.selectedTicker;
    const period = state.portfolioCharts.period;
    const index = state.portfolioCharts.index;
    const periodMap = { '1A': '1y', '3A': '3y', '5A': '5y', '10A': '10y', 'MAX': 'max' };
    const periodKey = periodMap[period] || '5y';
    const allTickers = (state.positions || []).map(p => p.ticker).filter(Boolean);
    const tickersToLoad = selected === 'Todas' ? allTickers : [selected];
    const CONCURRENCY = 3;

    for (let i = 0; i < tickersToLoad.length; i += CONCURRENCY) {
      const chunk = tickersToLoad.slice(i, i + CONCURRENCY);
      await Promise.all(chunk.map(async ticker => {
        const cacheKey = `${ticker}_${periodKey}`;
        if (state.portfolioCharts.chartData[cacheKey]) return;
        try {
          const data = await fetchPriceHistoryData(ticker, periodKey);
          if (data && data.length) state.portfolioCharts.chartData[cacheKey] = data;
        } catch (e) {}
      }));
      if (i + CONCURRENCY < tickersToLoad.length) await sleep(250);
    }

    state.portfolioCharts.loading = false;
    if (state.activeTab === 4) renderActiveTab();
  } catch (e) {
    state.portfolioCharts.loading = false;
    if (state.activeTab === 4) renderActiveTab();
  }
}

function renderPortfolioCharts(tickers) {
  const selected = state.portfolioCharts.selectedTicker;
  const period = state.portfolioCharts.period;
  const divPeriod = state.portfolioCharts.divPeriod;
  const activeTickers = selected === 'Todas' ? tickers : [selected];

  const sectorMap = {};
  const currencyMap = {};
  const companyMap = {};

  (state.positions || []).forEach(p => {
    const shares = Number(p.shares) || 0;
    const sector = p.sector || 'Otros';
    const currency = p.currency || 'EUR';
    const name = p.name || p.ticker || 'Sin nombre';
    sectorMap[sector] = (sectorMap[sector] || 0) + shares;
    currencyMap[currency] = (currencyMap[currency] || 0) + shares;
    companyMap[name] = (companyMap[name] || 0) + shares;
  });

  const sectorItems = Object.entries(sectorMap).sort((a, b) => b[1] - a[1]).map(([label, value]) => ({ label, value }));
  const currencyItems = Object.entries(currencyMap).sort((a, b) => b[1] - a[1]).map(([label, value]) => ({ label, value }));
  const companyItems = Object.entries(companyMap).sort((a, b) => b[1] - a[1]).slice(0, 8).map(([label, value]) => ({ label, value }));

  return `
    <div style="padding:14px">
      ${renderChartsSelector(tickers)}
      <div class="charts-grid charts-grid-main">
        <div class="chart-card chart-wide">
          <h4>Evolución de la cartera</h4>
          <div class="muted" style="font-size:12px;margin-bottom:8px">Vista: ${selected === 'Todas' ? 'Todas las empresas' : selected} · ${period}</div>
          ${buildPortfolioChartSVG(activeTickers, period)}
        </div>
        <div class="chart-card chart-wide">
          <h4>Dividendos históricos</h4>
          <div style="display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap">
            ${['Mensual', 'Trimestral', 'Anual'].map(p => `
              <button onclick="state.portfolioCharts.divPeriod='${p}'; renderActiveTab()" style="padding:2px 10px;border:1px solid ${divPeriod === p ? '#2563eb' : '#e2e8f0'};border-radius:4px;font-size:10px;font-weight:600;background:${divPeriod === p ? '#2563eb' : '#fff'};color:${divPeriod === p ? '#fff' : '#64748b'};cursor:pointer">${p}</button>
            `).join('')}
          </div>
          ${buildDividendChartSVG(activeTickers, divPeriod)}
        </div>
      </div>

      <div class="charts-grid charts-grid-3">
        <div class="chart-card">
          <h4>Por sector</h4>
          ${renderDonutChart(sectorItems, { centerTop: 'Sectores', centerBottom: 'Cartera', maxHeight: 300 })}
        </div>
        <div class="chart-card">
          <h4>Por divisa</h4>
          ${renderDonutChart(currencyItems, { centerTop: 'Divisas', centerBottom: 'Cartera', maxHeight: 300 })}
        </div>
        <div class="chart-card">
          <h4>Por empresas</h4>
          ${renderDonutChart(companyItems, { centerTop: 'Empresas', centerBottom: 'Top', maxHeight: 300 })}
        </div>
      </div>
    </div>
  `;
}

function renderCharts() {
  const tickers = [...new Set((state.positions || []).map(p => p.ticker).filter(Boolean))].sort();
  if (!tickers.length) {
    return `<div style="padding:40px 20px;text-align:center;color:#94a3b8;font-size:13px">
      <p style="font-weight:600;font-size:15px;color:#475569">Añade posiciones a tu cartera</p>
    </div>`;
  }
  return renderPortfolioCharts(tickers);
}
function renderActiveTab() {
  const app = document.getElementById('app');
  const tabs = ['Cartera', 'Alertas', 'Dividendos', 'Transacciones', 'Gráficos'];
  app.innerHTML = `
    <div class="app-shell">
      <div class="tabs">
        ${tabs.map((t, i) => `<button class="tab-btn ${state.activeTab === i ? 'active' : ''}" onclick="state.activeTab=${i}; renderActiveTab()">${t}</button>`).join('')}
      </div>
      ${state.activeTab === 4 ? renderCharts() : `<div style="padding:20px" class="muted">Contenido pendiente de esa pestaña.</div>`}
    </div>
  `;
}

window.addEventListener('DOMContentLoaded', () => {
  renderActiveTab();
});
</script>
</body>
</html>
